{% extends "base.html" %}
{% block content %}
{% from 'bootstrap4/form.html' import render_form %}
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {{ render_form(form) }}
{% endblock %}
